<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In · ResumeFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="auth.css">
</head>
<body>

<main class="auth-shell">

  <section class="auth-form-side">
    <article class="auth-card">

      <a href="index.html" class="auth-brand">ResumeFlow</a>

      <hgroup class="auth-heading">
        <h1>Sign in</h1>
        <p>New here? <a href="register.html">Create an account</a></p>
      </hgroup>

      <button type="button" class="btn-google">Continue with Google</button>

      <p class="auth-divider">or sign in with email</p>

      <form id="loginForm" novalidate>

        <fieldset class="field">
          <label for="loginEmail">Email address</label>
          <input type="email" id="loginEmail" name="email" placeholder="you@example.com" required>
        </fieldset>

        <fieldset class="field">
          <label for="loginPassword">
            Password
            <a href="#">Forgot password?</a>
          </label>
          <input type="password" id="loginPassword" name="password" placeholder="••••••••" required>
          <button type="button" class="toggle-visibility" id="toggleLoginPassword">Show</button>
        </fieldset>

        <label class="checkbox-row">
          <input type="checkbox" id="rememberMe" name="remember">
          Remember me on this device
        </label>

        <button type="submit" class="btn-primary">Sign in</button>
      </form>

      <p class="auth-footnote">
        By continuing you agree to ResumeFlow's <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
      </p>

    </article>
  </section>

  <aside class="auth-visual-side">
    <hgroup class="visual-copy">
      <h2>Welcome back.</h2>
      <p>Pick up right where you left off and keep building a resume that gets noticed.</p>
    </hgroup>

    <figure class="resume-card-visual">
      <svg viewBox="0 0 260 220" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="10" width="240" height="200" rx="18" fill="#ffffff"/>
        <circle cx="46" cy="52" r="18" fill="#0d9488"/>
        <rect x="30" y="86" width="200" height="9" rx="4.5" fill="#e4e7ec"/>
        <rect x="30" y="106" width="140" height="9" rx="4.5" fill="#e4e7ec"/>
        <rect x="30" y="126" width="200" height="9" rx="4.5" fill="#e4e7ec"/>
        <rect x="30" y="150" width="90" height="11" rx="5.5" fill="#0d9488"/>
        <circle cx="228" cy="188" r="24" fill="#ffffff" stroke="#f1f3f5" stroke-width="1"/>
        <path d="M217 189l7 7 13-14" stroke="#0d9488" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <figcaption class="sr-only">Illustration of a completed resume being reviewed</figcaption>
    </figure>
  </aside>

</main>

<script>
  const toggleBtn = document.querySelector('#toggleLoginPassword');
  const passwordInput = document.querySelector('#loginPassword');

  toggleBtn.addEventListener('click', function () {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    toggleBtn.textContent = isHidden ? 'Hide' : 'Show';
  });

  document.querySelector('#loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    alert('This is a front-end demo — sign-in isn\'t connected to a server yet.');
  });
</script>

</body>
</html>
