<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account · ResumeFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="auth.css">
</head>
<body>

<main class="auth-shell">

  <aside class="auth-illustration-side">
    <a href="index.html" class="auth-brand">ResumeFlow</a>

    <figure class="illustration-figure">
      <svg viewBox="0 0 420 480" xmlns="http://www.w3.org/2000/svg">
        <circle cx="210" cy="230" r="150" fill="none" stroke="#27272a" stroke-width="1.5" stroke-dasharray="4 6"/>

        <rect x="130" y="120" width="160" height="210" rx="16" fill="#131318" stroke="#27272a" stroke-width="1.5"/>
        <circle cx="160" cy="150" r="12" fill="#3b82f6"/>
        <rect x="182" y="144" width="60" height="7" rx="3.5" fill="#3f3f46"/>
        <rect x="182" y="158" width="40" height="7" rx="3.5" fill="#3f3f46"/>
        <rect x="150" y="184" width="140" height="6" rx="3" fill="#27272a"/>
        <rect x="150" y="200" width="140" height="6" rx="3" fill="#27272a"/>
        <rect x="150" y="216" width="90" height="6" rx="3" fill="#27272a"/>
        <rect x="150" y="242" width="70" height="9" rx="4.5" fill="#3b82f6"/>
        <rect x="150" y="264" width="140" height="6" rx="3" fill="#27272a"/>
        <rect x="150" y="280" width="140" height="6" rx="3" fill="#27272a"/>
        <rect x="150" y="296" width="100" height="6" rx="3" fill="#27272a"/>

        <circle cx="90" cy="140" r="26" fill="#131318" stroke="#2dd4bf" stroke-width="1.5"/>
        <path d="M90 128v24M78 140h24" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round"/>

        <rect x="316" y="90" width="52" height="52" rx="14" fill="#131318" stroke="#3b82f6" stroke-width="1.5" transform="rotate(8 342 116)"/>
        <text x="342" y="122" font-family="monospace" font-size="16" fill="#3b82f6" text-anchor="middle" transform="rotate(8 342 116)">&lt;/&gt;</text>

        <rect x="60" y="330" width="60" height="60" rx="16" fill="#131318" stroke="#2dd4bf" stroke-width="1.5" transform="rotate(-6 90 360)"/>
        <path d="M78 372l7-16 7 10 6-20 7 26" stroke="#2dd4bf" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="rotate(-6 90 360)"/>

        <circle cx="330" cy="360" r="28" fill="#131318" stroke="#3b82f6" stroke-width="1.5"/>
        <path d="M330 346l4.5 9.5 10.5 1.5-7.6 7.4 1.8 10.6-9.2-4.8-9.2 4.8 1.8-10.6-7.6-7.4 10.5-1.5z" fill="#3b82f6"/>

        <circle cx="60" cy="230" r="4" fill="#3f3f46"/>
        <circle cx="360" cy="230" r="4" fill="#3f3f46"/>
        <circle cx="210" cy="70" r="4" fill="#3f3f46"/>
      </svg>
      <figcaption class="sr-only">Illustration of a new resume being created, surrounded by progress badges</figcaption>
    </figure>
  </aside>

  <section class="auth-form-side">
    <article class="auth-card">

      <hgroup class="auth-heading">
        <h1>Create Account</h1>
        <p>Already a member? <a href="login.html">Sign in</a></p>
      </hgroup>

      <p class="social-row">
        <button type="button" class="btn-social google">Sign up with Google</button>
        <button type="button" class="btn-social github">Sign up with GitHub</button>
      </p>

      <p class="auth-divider">or</p>

      <form id="registerForm" novalidate>

        <fieldset class="field">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Your name" required>
        </fieldset>

        <fieldset class="field">
          <label for="registerEmail">Email address</label>
          <input type="email" id="registerEmail" name="email" placeholder="you@example.com" required>
        </fieldset>

        <fieldset class="field">
          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" name="password" placeholder="At least 8 characters" required minlength="8">
          <button type="button" class="toggle-visibility" id="toggleRegisterPassword">Show</button>
        </fieldset>

        <button type="submit" class="btn-primary">Create Account</button>
      </form>

      <p class="auth-footnote">
        Already have an account? <a href="login.html">Log in</a>
      </p>

    </article>
  </section>

</main>

<script>
  const toggleBtn = document.querySelector('#toggleRegisterPassword');
  const passwordInput = document.querySelector('#registerPassword');

  toggleBtn.addEventListener('click', function () {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    toggleBtn.textContent = isHidden ? 'Hide' : 'Show';
  });

  document.querySelector('#registerForm').addEventListener('submit', function (e) {
    e.preventDefault();
    alert('This is a front-end demo — registration isn\'t connected to a server yet.');
  });
</script>

</body>
</html>
