<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Notes — IndexedDB Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f5f7fa;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      font-family: inherit;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    button {
      background-color: #14b8a6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }
    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }
    li {
      background-color: white;
      padding: 12px;
      margin-bottom: 8px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .delete-btn {
      background-color: #ef4444;
      padding: 4px 10px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <h1>My Resume Notes</h1>

  <textarea id="noteInput" placeholder="Write a note about your resume..."></textarea>
  <button id="saveBtn">Save Note</button>

  <ul id="notesList"></ul>

  <script>
    var db;
    var request = indexedDB.open("resumeNotesDB", 1);

    request.onupgradeneeded = function (event) {
      db = event.target.result;
      db.createObjectStore("notes", { keyPath: "id", autoIncrement: true });
    };

    request.onsuccess = function (event) {
      db = event.target.result;
      loadNotes();
    };

    request.onerror = function (event) {
      console.log("db error: " + event.target.errorCode);
    };

    function saveNote() {
      var noteInput = document.getElementById("noteInput");
      var text = noteInput.value.trim();

      if (text === "") {
        return;
      }

      var transaction = db.transaction(["notes"], "readwrite");
      var store = transaction.objectStore("notes");
      store.add({ text: text });

      transaction.oncomplete = function () {
        noteInput.value = "";
        loadNotes();
      };
    }

    function loadNotes() {
      var list = document.getElementById("notesList");
      list.innerHTML = "";

      var transaction = db.transaction(["notes"], "readonly");
      var store = transaction.objectStore("notes");
      var request = store.openCursor();

      request.onsuccess = function (event) {
        var cursor = event.target.result;

        if (cursor) {
          var li = document.createElement("li");

          var span = document.createElement("span");
          span.textContent = cursor.value.text;

          var deleteBtn = document.createElement("button");
          deleteBtn.textContent = "Delete";
          deleteBtn.className = "delete-btn";
          deleteBtn.setAttribute("data-id", cursor.value.id);
          deleteBtn.addEventListener("click", function () {
            deleteNote(cursor.value.id);
          });

          li.appendChild(span);
          li.appendChild(deleteBtn);
          list.appendChild(li);

          cursor.continue();
        }
      };
    }

    function deleteNote(id) {
      var transaction = db.transaction(["notes"], "readwrite");
      var store = transaction.objectStore("notes");
      store.delete(id);

      transaction.oncomplete = function () {
        loadNotes();
      };
    }

    document.getElementById("saveBtn").addEventListener("click", saveNote);
  </script>

</body>
</html>
